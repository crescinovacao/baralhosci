<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baralho SCI</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --bg: #ffffff;
      --brown: #210000;
      --blue-dark: #001B71;
      --blue: #007BEA;
      --blue-light: #B3DFFF;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .arena {
      width: 100%;
      max-width: 380px;
      padding: 32px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* DOTS */
    .progress-dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(33,0,0,0.15);
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .dot.active {
      background: #210000;
      transform: scale(1.3);
    }
    .dot.visited {
      background: rgba(33,0,0,0.45);
    }

    /* PILHA */
    .stack-wrap {
      width: 100%;
      position: relative;
      /* altura suficiente para mostrar as camadas */
      height: 0;
      padding-top: 145%;
    }

    /* cada carta é posicionada em cima da outra */
    .card {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* cartas de baixo — decorativas */
    .card-stack-2 {
      background: #ccc;
      transform: translate(6px, 6px);
      z-index: 1;
    }
    .card-stack-1 {
      background: #ddd;
      transform: translate(3px, 3px);
      z-index: 2;
    }

    /* carta principal — cima da pilha */
    .card-main {
      z-index: 10;
      perspective: 1000px;
      background: transparent;
      box-shadow: none;
      cursor: default;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
      cursor: pointer;
    }

    .card-inner.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    /* FRENTE */
    .card-front {
      flex-direction: column;
      gap: 0;
    }

    .card-front .card-logo {
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }

    .card-front .card-logo img {
      height: 22px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .card-front .card-label {
      font-weight: 800;
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      color: var(--white);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .card-front .hint {
      position: absolute;
      bottom: 22px;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
      letter-spacing: 0.06em;
      z-index: 1;
    }

    /* VERSO */
    .card-back {
      transform: rotateY(180deg);
      padding: 36px 32px;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }

    .back-title {
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
    }

    .back-text {
      font-size: clamp(1.1rem, 4.8vw, 1.4rem);
      line-height: 1.45;
      color: var(--white);
      font-weight: 500;
      text-align: left;
    }

    .back-text strong {
      font-weight: 800;
    }

    /* ANIMAÇÕES */
    @keyframes flyOut {
      from { transform: translateX(0); opacity: 1; }
      to   { transform: translateX(-40px); opacity: 0; }
    }

    .card-main.fly-out .card-inner {
      animation: flyOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* INSTRUCAO */
    .instrucao {
      text-align: center;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.03em;
    }

    @media (max-width: 400px) {
      .arena { padding: 24px 14px 20px; gap: 20px; }
      .card-back { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <div class="arena">

    <div class="progress-dots" id="progressDots"></div>

    <div class="stack-wrap" id="stackWrap">
      <!-- cartas decorativas de baixo -->
      <div class="card card-stack-2" id="stackCard2"></div>
      <div class="card card-stack-1" id="stackCard1"></div>

      <!-- carta principal -->
      <div class="card card-main" id="cardMain">
        <div class="card-inner" id="cardInner" onclick="handleClick()">
          <div class="card-face card-front" id="cardFront">
            <div class="card-logo">
              <img src="https://i.imgur.com/LU8FtBY.png" alt="Crescimentum">
            </div>
            <div class="card-label">Baralho<br>SCI</div>
            <div class="hint">Toque para revelar</div>
          </div>
          <div class="card-face card-back" id="cardBack">
            <div class="back-title">Baralho SCI</div>
            <div class="back-text" id="backText"></div>
          </div>
        </div>
      </div>
    </div>



  </div>

  <script>
    const cartas = [
      { texto: "Em uma reunião, inicia-se uma <strong>discussão</strong>, na qual a pessoa <strong>se irrita</strong> e <strong>faz acusações</strong> às outras pessoas.", cor: "#62003B" },
      { texto: "A pessoa se mostra <strong>confiante</strong> na apresentação de <strong>resultados da área</strong>.", cor: "#2D0051" },
      { texto: "A pessoa <strong>censura</strong> e <strong>critica as ideias</strong> da equipe durante todas as discussões.", cor: "#A50062" },
      { texto: "A pessoa <strong>nunca é proativa</strong>, especialmente em situações em que todas as pessoas <strong>precisam contribuir</strong> com uma parte.", cor: "#001B71" },
      { texto: "Em <strong>situações de negociação</strong> com outras áreas e colegas de trabalho, a pessoa <strong>é agressiva</strong> em sua abordagem e <strong>impõe seus interesses</strong> perante as demais.", cor: "#003E00" },
      { texto: "Em sua relação com as <strong>pessoas colegas de trabalho</strong>, a pessoa despreza o que as outras falam, sendo uma <strong>péssima ouvinte</strong> e <strong>sempre interrompendo as outras pessoas</strong>.", cor: "#733909" },
      { texto: "A pessoa <strong>não apresenta</strong> o <strong>comportamento</strong> de <strong>dono do negócio</strong> e não se compromete com os resultados da empresa.", cor: "#004641" },
      { texto: "A pessoa é <strong>criativa</strong> e constantemente busca um <strong>resultado diferente</strong>.", cor: "#385438" },
      { texto: "A pessoa, além de ser <strong>desorganizada e esquecida</strong>, muitas vezes dispersa a equipe em reuniões importantes.", cor: "#6D3B38" },
      { texto: "A pessoa demonstra <strong>espírito de equipe</strong> e procura <strong>interagir e cooperar</strong> com as demais áreas da organização.", cor: "#876300" }
    ];

    let atual = 0;
    let estado = "frente"; // "frente" | "verso"
    let animando = false;

    const cardMain   = document.getElementById("cardMain");
    const cardInner  = document.getElementById("cardInner");
    const cardFront  = document.getElementById("cardFront");
    const cardBack   = document.getElementById("cardBack");
    const backText   = document.getElementById("backText");
    const dotsWrap   = document.getElementById("progressDots");

    const stack1     = document.getElementById("stackCard1");
    const stack2     = document.getElementById("stackCard2");

    // Cria dots
    cartas.forEach((_, i) => {
      const d = document.createElement("span");
      d.className = "dot";
      dotsWrap.appendChild(d);
    });

    function atualizaDots() {
      const dots = dotsWrap.querySelectorAll(".dot");
      dots.forEach((d, i) => {
        d.classList.remove("active", "visited");
        if (i === atual) d.classList.add("active");
        else if (i < atual) d.classList.add("visited");
      });
    }

    function atualizaCorPilha() {
      const prox1 = cartas[(atual + 1) % cartas.length];
      const prox2 = cartas[(atual + 2) % cartas.length];
      stack1.style.background = prox1.cor;
      stack2.style.background = prox2.cor;
      // deixa as pilhas um pouco mais claras
      stack1.style.opacity = "0.5";
      stack2.style.opacity = "0.3";
    }

    function carregaCarta() {
      const c = cartas[atual];
      cardFront.style.background = c.cor;
      cardBack.style.background = c.cor;
      backText.innerHTML = c.texto;
      // garante frente visível
      cardInner.classList.remove("flipped");
      estado = "frente";
      atualizaDots();
      atualizaCorPilha();
    }

    function proximaCarta() {
      if (animando) return;
      animando = true;

      // anima saída
      cardMain.classList.add("fly-out");

      setTimeout(() => {
        cardMain.classList.remove("fly-out");
        atual = (atual + 1) % cartas.length;
        carregaCarta();
        animando = false;
      }, 300);
    }

    function handleClick() {
      if (animando) return;

      if (estado === "frente") {
        // vira para mostrar o texto
        cardInner.classList.add("flipped");
        estado = "verso";
      } else {
        // vai para a próxima
        proximaCarta();
      }
    }

    // swipe
    let touchStartX = 0;
    let isDragging = false;

    cardMain.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      isDragging = false;
    }, { passive: true });

    cardMain.addEventListener("touchmove", e => {
      if (Math.abs(e.touches[0].clientX - touchStartX) > 8) isDragging = true;
    }, { passive: true });

    cardMain.addEventListener("touchend", e => {
      if (!isDragging) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50 && estado === "verso") proximaCarta();
      isDragging = false;
    });

    // teclado
    document.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") handleClick();
    });

    // init
    carregaCarta();
  </script>
</body>
</html>
