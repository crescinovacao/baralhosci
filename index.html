<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baralho SCI</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --white: #ffffff;
      --bg: #fbfbfb;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .arena {
      width: 100%;
      max-width: 360px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* DOTS */
    .progress-dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(33,0,0,0.15);
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .dot.active {
      background: #210000;
      transform: scale(1.3);
    }
    .dot.visited {
      background: rgba(33,0,0,0.45);
    }

    /* PILHA */
    .stack-wrap {
      width: 100%;
      position: relative;
      height: 0;
      padding-top: 145%;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    }

    .card-stack-2 {
      transform: translate(6px, 6px);
      z-index: 1;
    }
    .card-stack-1 {
      transform: translate(3px, 3px);
      z-index: 2;
    }

    /* carta principal */
    .card-main {
      z-index: 10;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* FLIP via opacidade — compatível com Safari iOS */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card-front {
      flex-direction: column;
      opacity: 1;
      transform: scale(1);
      z-index: 2;
    }

    .card-back {
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 32px;
      opacity: 0;
      transform: scale(0.97);
      z-index: 1;
    }

    /* estado virado */
    .card-main.virado .card-front {
      opacity: 0;
      transform: scale(0.97);
      z-index: 1;
    }
    .card-main.virado .card-back {
      opacity: 1;
      transform: scale(1);
      z-index: 2;
    }

    /* FRENTE */
    .card-logo {
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }
    .card-logo img {
      height: 22px;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .card-label {
      font-weight: 800;
      font-size: clamp(1.8rem, 8vw, 2.6rem);
      color: var(--white);
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
    }

    .hint {
      position: absolute;
      bottom: 22px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    /* VERSO */
    .back-title {
      position: absolute;
      top: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .back-text {
      font-size: clamp(1.25rem, 5.5vw, 1.5rem);
      line-height: 1.45;
      color: var(--white);
      font-weight: 500;
      text-align: left;
    }

    .back-text strong {
      font-weight: 800;
    }

    /* ANIMAÇÃO SAÍDA */
    @keyframes flyOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-40px); }
    }

    .card-main.fly-out {
      animation: flyOut 0.28s ease forwards;
      pointer-events: none;
    }

    @media (max-width: 400px) {
      .card-back { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <div class="arena">

    <div class="progress-dots" id="progressDots"></div>

    <div class="stack-wrap">
      <div class="card card-stack-2" id="stackCard2"></div>
      <div class="card card-stack-1" id="stackCard1"></div>

      <div class="card card-main" id="cardMain" onclick="handleClick()">
        <div class="card-face card-front" id="cardFront">
          <div class="card-logo">
            <img src="https://i.imgur.com/LU8FtBY.png" alt="Crescimentum">
          </div>
          <div class="card-label">Baralho<br>SCI</div>
          <div class="hint">Toque para revelar</div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="back-title">Baralho SCI</div>
          <div class="back-text" id="backText"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const cartas = [
      { texto: "Em uma reunião, inicia-se uma <strong>discussão</strong>, na qual a pessoa <strong>se irrita</strong> e <strong>faz acusações</strong> às outras pessoas.", cor: "#62003B" },
      { texto: "A pessoa se mostra <strong>confiante</strong> na apresentação de <strong>resultados da área</strong>.", cor: "#2D0051" },
      { texto: "A pessoa <strong>censura</strong> e <strong>critica as ideias</strong> da equipe durante todas as discussões.", cor: "#A50062" },
      { texto: "A pessoa <strong>nunca é proativa</strong>, especialmente em situações em que todas as pessoas <strong>precisam contribuir</strong> com uma parte.", cor: "#001B71" },
      { texto: "Em <strong>situações de negociação</strong> com outras áreas e colegas de trabalho, a pessoa <strong>é agressiva</strong> em sua abordagem e <strong>impõe seus interesses</strong> perante as demais.", cor: "#003E00" },
      { texto: "Em sua relação com as <strong>pessoas colegas de trabalho</strong>, a pessoa despreza o que as outras falam, sendo uma <strong>péssima ouvinte</strong> e <strong>sempre interrompendo as outras pessoas</strong>.", cor: "#733909" },
      { texto: "A pessoa <strong>não apresenta</strong> o <strong>comportamento</strong> de <strong>dono do negócio</strong> e não se compromete com os resultados da empresa.", cor: "#004641" },
      { texto: "A pessoa é <strong>criativa</strong> e constantemente busca um <strong>resultado diferente</strong>.", cor: "#385438" },
      { texto: "A pessoa, além de ser <strong>desorganizada e esquecida</strong>, muitas vezes dispersa a equipe em reuniões importantes.", cor: "#6D3B38" },
      { texto: "A pessoa demonstra <strong>espírito de equipe</strong> e procura <strong>interagir e cooperar</strong> com as demais áreas da organização.", cor: "#876300" }
    ];

    let atual = 0;
    let estado = "frente";
    let animando = false;

    const cardMain  = document.getElementById("cardMain");
    const cardFront = document.getElementById("cardFront");
    const cardBack  = document.getElementById("cardBack");
    const backText  = document.getElementById("backText");
    const dotsWrap  = document.getElementById("progressDots");
    const stack1    = document.getElementById("stackCard1");
    const stack2    = document.getElementById("stackCard2");

    cartas.forEach((_, i) => {
      const d = document.createElement("span");
      d.className = "dot";
      dotsWrap.appendChild(d);
    });

    function atualizaDots() {
      dotsWrap.querySelectorAll(".dot").forEach((d, i) => {
        d.classList.remove("active", "visited");
        if (i === atual) d.classList.add("active");
        else if (i < atual) d.classList.add("visited");
      });
    }

    function atualizaPilha() {
      const p1 = cartas[(atual + 1) % cartas.length];
      const p2 = cartas[(atual + 2) % cartas.length];
      stack1.style.background = p1.cor;
      stack1.style.opacity = "0.45";
      stack2.style.background = p2.cor;
      stack2.style.opacity = "0.25";
    }

    function carregaCarta() {
      const c = cartas[atual];
      cardFront.style.background = c.cor;
      cardBack.style.background = c.cor;
      backText.innerHTML = c.texto;
      cardMain.classList.remove("virado");
      estado = "frente";
      atualizaDots();
      atualizaPilha();
    }

    function proximaCarta() {
      if (animando) return;
      animando = true;

      cardMain.classList.add("fly-out");

      setTimeout(() => {
        cardMain.classList.remove("fly-out");
        atual = (atual + 1) % cartas.length;
        carregaCarta();
        animando = false;
      }, 280);
    }

    function handleClick() {
      if (animando) return;
      if (estado === "frente") {
        cardMain.classList.add("virado");
        estado = "verso";
      } else {
        proximaCarta();
      }
    }

    // swipe
    let touchStartX = 0;
    let isDragging = false;

    cardMain.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      isDragging = false;
    }, { passive: true });

    cardMain.addEventListener("touchmove", e => {
      if (Math.abs(e.touches[0].clientX - touchStartX) > 8) isDragging = true;
    }, { passive: true });

    cardMain.addEventListener("touchend", e => {
      if (!isDragging) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50 && estado === "verso") proximaCarta();
      isDragging = false;
    });

    document.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") handleClick();
    });

    carregaCarta();
  </script>
</body>
</html>
